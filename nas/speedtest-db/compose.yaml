services:
  speedtest-db:
    image: postgres:15
    container_name: speedtest-db
    env_file:
      - sops-secrets.env
    ports:
      - 5435:5432
    volumes:
      - ${DB_DATA_LOCATION}/pg15:/var/lib/postgresql/data
    labels:
      - "autoheal=true"
      - "com.centurylinklabs.watchtower.scope=true"
    restart: unless-stopped
