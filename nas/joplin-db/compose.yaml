services:
  joplin-db:
    image: postgres:16
    container_name: joplin-db
    env_file:
      - sops-secrets.env
    ports:
      - 5433:5432
    volumes:
      - ${DB_DATA_LOCATION}/db-pg16:/var/lib/postgresql/data
    labels:
      - "autoheal=true"
      - "com.centurylinklabs.watchtower.scope=true"
    restart: unless-stopped
