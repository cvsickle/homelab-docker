services:
  zachiswrong:
    image: 10.69.1.40:5000/broiswrong:latest
    container_name: ZachIsWrong
    env_file:
      - .env
    dns:
      - 10.69.1.2
      - 10.69.1.3
    ports:
      - 8010:8080
    volumes:
      - ${DIR_CONFIG}/zachiswrong/config:/app/Data
      - ${DIR_CONFIG}/zachiswrong/images:/app/Images
    labels:
      - "autoheal=true"
      - "com.centurylinklabs.watchtower.scope=true"
    restart: unless-stopped
