services:
  freshrss:
    image: linuxserver/freshrss:latest
    container_name: freshrss
    env_file:
      - .env
    ports:
      - 8002:80
    volumes:
      - ${DIR_CONFIG}/freshrss:/config
    labels:
      - "autoheal=true"
      - "com.centurylinklabs.watchtower.scope=true"
    restart: unless-stopped
