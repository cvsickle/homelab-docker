services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    env_file:
      - .env
    dns:
      - 10.69.1.2
      - 10.69.1.3
    ports:
      - 8003:3000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${DIR_CONFIG}/homepage-local/config:/app/config
      - ${DIR_CONFIG}/homepage-local/icons:/app/public/icons
    labels:
      - "autoheal=true"
      - "com.centurylinklabs.watchtower.scope=true"
    restart: unless-stopped
